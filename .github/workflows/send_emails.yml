name: Send HR Emails

on:
  schedule:
    # 05:00 UTC = 10:30 AM IST, every day
    - cron: '0 5 * * *'

  # Lets you trigger this manually from the GitHub Actions tab anytime
  workflow_dispatch:

jobs:
  send-emails:
    runs-on: ubuntu-latest

    # Give the workflow write permission so it can commit the moved CSV back
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run email script
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python send_hr_emails.py

      - name: Commit moved CSV and log back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending/ sent/ logs/
          # Only commit if there is actually something new to commit
          git diff --cached --quiet || git commit -m "chore: daily run $(date '+%Y-%m-%d') — move CSV + save log"
          git push
